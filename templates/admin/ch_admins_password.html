<!DOCTYPE html> 
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- <link rel="stylesheet" href="../static/style.css"> -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <aside class="menu">
        <ul>
            <li><a href="/">TOP</a></li>
            <li><a href="/register">会員登録</a></li>
            <li><a href="/login">ログイン</a></li>
            <br><br><br><br>
            <li><a href="/admin/login">管理者ログイン</a></li>
        </ul>
    </aside>
    <main class="content">
        <h1>あいうえお美術館</h1>
        <h2>管理者ページ</h2>
        <h3>パスワード変更</h3>

        {% with messages = get_flashed_messages(category_filter=["ch_admins_password"]) %}
            {% if messages %}
                <div class="flash">
                {% for message in messages %}
                    <p>{{ message }}</p>
                {% endfor %}
                </div>
            {% endif %}
        {% endwith %}

        <div class="container">           
            <form action="{{ url_for('main.change_admins_password') }}" method="post">
                <input type="hidden" name="target" value="{{ target.username }}">

                <label>現在のパスワード：</label>
                <input type="password" name="password_current" placeholder="現在のパスワード"><br><br>

                <label>新しいパスワード：</label>
                <input type="password" name="password_new" placeholder="新しいパスワード" ><br>

                <label>新しいパスワード（確認用）：</label>
                <input type="password" name="password_check" placeholder="新しいパスワード（確認用）" ><br>
                <br>
                <button type="submit">変更</button>
            </form><br><br>
            <form action="/admin/search" method="GET">
                <button type="submit">キャンセル</button>
            </form>
        </div>
    </main>
</body>
   
</html>
