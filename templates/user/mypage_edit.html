<!DOCTYPE html> 
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- <link rel="stylesheet" href="../static/style.css"> -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <aside class="menu">
        <ul>
            <li><a href="/">TOP</a></li>
            <li><a href="/register">会員登録</a></li>
            <li><a href="/login">ログイン</a></li>
            <br><br><br><br>
            <li><a href="/admin/login">管理者ログイン</a></li>
        </ul>
    </aside>
    <main class="content">
        <h1>あいうえお美術館</h1>
        <h2>マイページ</h2>

        {% with messages = get_flashed_messages(category_filter=["mypage_edit"]) %}
            {% if messages %}
                <div class="flash">
                {% for message in messages %}
                    <p>{{ message }}</p>
                {% endfor %}
                </div>
            {% endif %}
        {% endwith %}

        <div class="container">
            <h2>{{ current_user.name }} さんのアカウント情報編集</h2>
            <form action="{{ url_for('main.update_mypage') }}" method="post">
                <label>名前：</label>
                <input type="text" name="name" value="{{ data.name if data else '' }}"><br>
                <label>メール：</label>
                <input type="text" name="email" value="{{ data.email if data else '' }}"><br>
                <label>郵便番号：</label>
                <input type="text" name="zip1" id="zip1" maxlength="3" value="{{ data.zip1 if data else '' }}"> -
                <input type="text" name="zip2" id="zip2" maxlength="4" value="{{ data.zip2 if data else '' }}">
                <input type="hidden" name="zipcode" id="zipcode" value="{{ data.zipcode if data else '' }}">
                <button type="button" id="searchAddress">住所検索</button>
                <label>住所：</label>
                <input type="text" name="address" id="address" value="{{ data.address if data else '' }}"><br>
                <label>電話：</label>
                <input type="text" name="phone" value="{{ data.phone if data else '' }}"><br><br>
                <button type="submit">登録</button>
            </form>
            <br><br>
        </div>
    </main>

     <script src="{{ url_for('static', filename='js/address.js') }}"></script>

</body>
   
</html>
