<!DOCTYPE html> 
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- <link rel="stylesheet" href="../static/style.css"> -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <aside class="menu">
        <ul>
            <li><a href="/">TOP</a></li>
            <li><a href="/register">会員登録</a></li>
            <li><a href="/login">ログイン</a></li>
            <br><br><br><br>
            <li><a href="/admin/login">管理者ログイン</a></li>
        </ul>
    </aside>
    <main class="content">
        <h1>あいうえお美術館</h1>
        <h2>管理者ページ</h2>
        <h3>会員詳細情報</h3>

        {% with messages = get_flashed_messages(category_filter=["user_detail"]) %}
            {% if messages %}
                <div class="flash">
                {% for message in messages %}
                    <p>{{ message }}</p>
                {% endfor %}
                </div>
            {% endif %}
        {% endwith %}

        <div class="container">           
            <form action="{{ url_for('main.admin_user_update', id=user.id) }}" method="GET">
                <label>会員ID：</label>
                <input type="text" name="id" value="{{ user.id }}" readonly><br>

                <label>名前：</label>
                <input type="text" name="name" value="{{ user.name }}" readonly><br>

                <label>メール：</label>
                <input type="text" name="email" value="{{ user.email }}" readonly><br>
                <label>郵便番号：</label>
                <input type="text" name="zip1" id="zip1" maxlength="3" value="{{ zip1 }}" readonly> -
                <input type="text" name="zip2" id="zip2" maxlength="4" value="{{ zip2 }}" readonly>
                <input type="hidden" name="zipcode" id="zipcode" value="{{ user.zipcode }}" readonly>
                <button type="button" id="searchAddress">住所検索</button>
                <label>住所：</label>
                <input type="text" name="address" value="{{ user.address }}" readonly><br>

                <label>電話：</label>
                <input type="text" name="phone" value="{{ user.phone }}" readonly><br><br>

                <label>ステータス：</label>
                <input type="text" name="membership_status" value="{{ user.membership_status }}" readonly><br><br>

                <button type="submit">編集</button>
            </form><br><br>
            <div class="button-row">
                <form action="{{ url_for('main.admin_user_delete', id=user.id) }}" method="POST">
                    <button type="submit">削除</button>
                </form>
                <form action="{{ url_for('main.admin_search_results', id=user.id) }}" method="GET">
                    <button type="submit">戻る</button>
                </form>                
                <form action="/admin/logout" method="GET">
                    <button type="submit">ログアウト</button>
                </form>
            </div>
        </div>
    </main>
</body>
   
</html>
